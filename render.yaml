services:
  # ── Backend API ──────────────────────────────
  - type: web
    name: novacode-tenders-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false          # Set this manually in Render dashboard
      - key: DB_PATH
        value: /opt/render/project/src/tenders.db
      - key: PYTHON_VERSION
        value: 3.11.0

  # ── Frontend ─────────────────────────────────
  - type: web
    name: novacode-tenders-ui
    runtime: static
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: build
    envVars:
      - key: REACT_APP_API_URL
        sync: false          # Set to your backend URL e.g. https://novacode-tenders-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
